<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0c1a3a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Status do Almoxarifado SEMCAS — Água, Gás e Materiais">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <title>Status · SEMCAS Almoxarifado</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0c1a3a;
      --navy-2:      #142454;
      --sky:         #0ea5e9;
      --sky-bg:      #f0f9ff;
      --sky-bd:      #bae6fd;
      --orange:      #ea8300;
      --orange-bg:   #fff7ed;
      --orange-bd:   #fed7aa;
      --green:       #16a34a;
      --green-bg:    #f0fdf4;
      --green-bd:    #86efac;
      --yellow:      #d97706;
      --yellow-bg:   #fffbeb;
      --yellow-bd:   #fde68a;
      --red:         #dc2626;
      --red-bg:      #fef2f2;
      --red-bd:      #fecaca;
      --gray-100:    #f1f5f9;
      --gray-200:    #e2e8f0;
      --gray-400:    #94a3b8;
      --gray-500:    #64748b;
      --gray-900:    #0f172a;
      --font-num:    'JetBrains Mono', ui-monospace, monospace;
    }

    html { height: 100%; scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 60%, #1a306b 100%);
      padding: env(safe-area-inset-top, 0px) 0 0;
    }
    .topbar-inner {
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand { flex: 1; min-width: 0; }
    .brand-row { display: flex; align-items: center; gap: 8px; }
    .brand-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,.7);
      flex-shrink: 0; animation: livepulse 2.5s ease-in-out infinite;
    }
    @keyframes livepulse {
      0%,100% { opacity:1; box-shadow:0 0 8px rgba(34,197,94,.7); }
      50%      { opacity:.5; box-shadow:0 0 4px rgba(34,197,94,.3); }
    }
    .brand-title { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .brand-sub   { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; font-weight: 500; }

    .topbar-refresh {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.9); padding: 9px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 600; font-family: 'Outfit', sans-serif;
      cursor: pointer; flex-shrink: 0; transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .topbar-refresh:active   { background: rgba(255,255,255,.22); }
    .topbar-refresh:disabled { opacity: .45; cursor: not-allowed; }
    .spin { animation: spin .9s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .main { padding: 14px 14px 20px; max-width: 540px; margin: 0 auto; }

    .notice {
      background:#fef3c7; border:1px solid #fde68a; border-radius:12px;
      padding:12px 14px; margin-bottom:14px; display:none;
      font-size:13px; color:#92400e; font-weight:500; gap:8px; align-items:flex-start;
    }
    .notice.show { display:flex; }
    .notice.err  { background:var(--red-bg); border-color:var(--red-bd); color:#991b1b; }

    .card {
      background: #fff; border-radius: 18px; border: 1px solid var(--gray-200);
      overflow: hidden; margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
    }
    .card-head {
      padding: 13px 16px 12px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--gray-100);
    }
    .card-ic {
      width: 38px; height: 38px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .ic-water { background: var(--sky-bg); }
    .ic-gas   { background: var(--orange-bg); }
    .ic-sep   { background: var(--yellow-bg); }
    .ic-ok    { background: var(--green-bg); }

    .card-label {
      flex: 1; font-size: 11px; font-weight: 800;
      color: var(--gray-500); text-transform: uppercase; letter-spacing: .07em;
    }
    .card-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 26px; height: 26px; padding: 0 8px;
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 20px; font-size: 12px; font-weight: 800;
      color: var(--gray-500); font-family: var(--font-num);
    }
    .card-badge.has { background:var(--green-bg); border-color:var(--green-bd); color:var(--green); }

    .card-body { padding: 16px; }

    .stock-wrap { display: flex; align-items: center; gap: 14px; }
    .stock-num {
      font-family: var(--font-num); font-size: 60px; font-weight: 700;
      line-height: 1; letter-spacing: -3px; flex-shrink: 0;
    }
    .c-sky    { color: var(--sky);    }
    .c-orange { color: var(--orange); }
    .c-yellow { color: var(--yellow); }
    .c-red    { color: var(--red);    }

    .stock-right { flex: 1; min-width: 0; }
    .stock-unit  { font-size: 14px; font-weight: 600; color: var(--gray-500); margin-bottom: 8px; }

    .status-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 20px;
      font-size: 12px; font-weight: 700; border: 1.5px solid;
    }
    .chip-ok   { background:var(--green-bg);  color:#065f46; border-color:var(--green-bd); }
    .chip-low  { background:var(--yellow-bg); color:#92400e; border-color:var(--yellow-bd); }
    .chip-zero { background:var(--red-bg);    color:#991b1b; border-color:var(--red-bd); }
    .chip-dot  { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .chip-ok   .chip-dot { background:var(--green);  }
    .chip-low  .chip-dot { background:var(--yellow); }
    .chip-zero .chip-dot { background:var(--red);    }

    .mat-list  { display: flex; flex-direction: column; gap: 8px; }
    .mat-item  {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 12px 14px; border-radius: 13px; border: 1.5px solid;
    }
    .mat-item.s-sep    { background:var(--yellow-bg); border-color:var(--yellow-bd); }
    .mat-item.s-pronto { background:var(--green-bg);  border-color:var(--green-bd); }
    .mat-emoji { font-size: 24px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
    .mat-body  { flex: 1; min-width: 0; }
    .mat-unit  { font-size: 16px; font-weight: 700; color:var(--gray-900); line-height:1.3; word-break:break-word; }
    .mat-tipos { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
    .tipo-tag  {
      display:inline-block; padding:2px 9px; border-radius:6px;
      font-size:10px; font-weight:800; letter-spacing:.05em; text-transform:uppercase;
    }
    .tag-cras   { background:#dbeafe; color:#1e40af; }
    .tag-creas  { background:#fce7f3; color:#9d174d; }
    .tag-pop    { background:#dcfce7; color:#166534; }
    .tag-ct     { background:#e0f2fe; color:#0369a1; }
    .tag-abrigo { background:#f3e8ff; color:#6b21a8; }
    .tag-sede   { background:#fef9c3; color:#92400e; }
    .tag-outros { background:var(--gray-100); color:var(--gray-500); }

    .mat-sep-row {
      display:flex; align-items:center; gap:5px; margin-top:7px;
      font-size:12px; font-weight:600; color:#334155;
      background:rgba(0,0,0,.06); padding:4px 9px; border-radius:7px; width:fit-content;
    }
    .mat-sep-row.green { background:rgba(22,163,74,.1); color:#065f46; }

    .empty     { text-align:center; padding:22px 14px; color:var(--gray-400); }
    .empty-ic  { font-size:30px; margin-bottom:6px; }
    .empty-txt { font-size:13px; font-weight:500; }

    .skeleton {
      background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
      background-size: 200% 100%; animation: shimmer 1.6s infinite;
      border-radius: 12px; height: 64px;
    }
    .skeleton.sm { height: 42px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .search-card { position: relative; }
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 14px 44px 14px 44px; border-radius: 12px;
      border: 1.5px solid var(--gray-200); background: var(--gray-100);
      font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 500;
      color: var(--gray-900); outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .search-input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(14,165,233,.15); background: #fff; }
    .search-input::placeholder { color: var(--gray-400); }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 18px; pointer-events: none;
    }
    .search-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 30px; height: 30px; border-radius: 50%; border: 0;
      background: var(--gray-200); color: var(--gray-500);
      display: none; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .search-clear.show { display: flex; }

    .chip-row {
      display: flex; gap: 6px; margin-top: 10px; overflow-x: auto;
      scrollbar-width: none; -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .chip-row::-webkit-scrollbar { display: none; }
    .quick-chip {
      flex-shrink: 0; padding: 7px 13px; border-radius: 20px;
      background: var(--gray-100); border: 1.5px solid var(--gray-200);
      font-size: 12px; font-weight: 700; color: var(--gray-500);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: all .12s; font-family: 'Outfit', sans-serif;
    }
    .quick-chip:active { transform: scale(.96); }
    .quick-chip.active { background: var(--navy); border-color: var(--navy); color: #fff; }

    .suggest-list {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #fff; border: 1px solid var(--gray-200); border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 50;
      max-height: 240px; overflow-y: auto; display: none;
    }
    .suggest-list.show { display: block; }
    .suggest-item {
      padding: 11px 14px; cursor: pointer; font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--gray-100);
      -webkit-tap-highlight-color: transparent;
    }
    .suggest-item:last-child { border-bottom: 0; }
    .suggest-item:active { background: var(--gray-100); }
    .suggest-name { flex: 1; min-width: 0; color: var(--gray-900); }
    .suggest-status {
      flex-shrink: 0; font-size: 10px; font-weight: 800;
      padding: 3px 8px; border-radius: 999px; text-transform: uppercase;
    }
    .suggest-status.pronto { background: var(--green-bg); color: var(--green); }
    .suggest-status.sep    { background: var(--yellow-bg); color: var(--yellow); }

    .search-banner {
      display: none; flex-direction: column; align-items: stretch; gap: 4px;
      margin-top: 12px; padding: 18px 16px; border-radius: 14px; border: 2px solid;
      text-align: center;
    }
    .search-banner.show { display: flex; }
    .search-banner.b-pronto { background: var(--green-bg); border-color: var(--green); color: #065f46; }
    .search-banner.b-sep    { background: var(--yellow-bg); border-color: var(--yellow); color: #92400e; }
    .search-banner.b-none   { background: var(--gray-100); border-color: var(--gray-200); color: var(--gray-500); }
    .search-banner-ic    { font-size: 38px; line-height: 1; margin-bottom: 4px; }
    .search-banner-title { font-size: 18px; font-weight: 800; letter-spacing: -.2px; }
    .search-banner-sub   { font-size: 13px; font-weight: 600; opacity: .85; }
    .search-banner-unit  { font-size: 12px; font-weight: 700; opacity: .7; margin-top: 2px; }

    /* Compact stock row */
    .stock-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    .stock-mini {
      background: #fff; border: 1px solid var(--gray-200); border-radius: 14px;
      padding: 12px 14px; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .stock-mini-ic {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .stock-mini.water .stock-mini-ic { background: var(--sky-bg); }
    .stock-mini.gas   .stock-mini-ic { background: var(--orange-bg); }
    .stock-mini-body { flex: 1; min-width: 0; }
    .stock-mini-num {
      font-family: var(--font-num); font-size: 26px; font-weight: 700;
      line-height: 1; letter-spacing: -1px;
    }
    .stock-mini.water .stock-mini-num { color: var(--sky); }
    .stock-mini.gas   .stock-mini-num { color: var(--orange); }
    .stock-mini-num.low  { color: var(--yellow) !important; }
    .stock-mini-num.zero { color: var(--red)    !important; }
    .stock-mini-lbl {
      font-size: 10px; font-weight: 700; color: var(--gray-500);
      text-transform: uppercase; letter-spacing: .05em; margin-top: 3px;
    }
    .stock-mini-chip {
      display: inline-block; font-size: 9.5px; font-weight: 800;
      padding: 1px 6px; border-radius: 999px; margin-top: 3px;
      letter-spacing: .04em;
    }
    .stock-mini-chip.ok   { background: var(--green-bg);  color: var(--green);  }
    .stock-mini-chip.low  { background: var(--yellow-bg); color: var(--yellow); }
    .stock-mini-chip.zero { background: var(--red-bg);    color: var(--red);    }

    @media (prefers-color-scheme:dark) {
      .search-input { background:#1e293b; border-color:#334155; color:#e2e8f0; }
      .search-input:focus { background:#1e293b; border-color:var(--sky); }
      .search-banner.b-pronto { background:#052e1633; border-color:#166534; color:#86efac; }
      .search-banner.b-sep    { background:#451a0333; border-color:#92400e; color:#fcd34d; }
      .search-banner.b-none   { background:#1e293b; border-color:#334155; color:#94a3b8; }
    }

    .footer-bar {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:4px 18px 16px; font-size:11px; color:var(--gray-400); font-weight:500;
      max-width:540px; margin:0 auto;
    }
    .live-dot {
      width:6px; height:6px; border-radius:50%;
      background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,.5); flex-shrink:0;
    }
    #countdownEl { font-family:var(--font-num); }

    @media (max-width:380px) {
      .topbar-inner { padding:12px 14px; }
      .brand-title  { font-size:15px; }
      .main         { padding:10px 10px 20px; }
      .stock-num    { font-size:50px; }
    }
    @media (min-width:600px) {
      .main { padding:20px 20px 28px; }
      .stock-num { font-size:68px; }
    }

    @media (prefers-color-scheme:dark) {
      body       { background:#0f172a; color:#e2e8f0; }
      .card      { background:#1e293b; border-color:#334155; }
      .card-head { border-bottom-color:#334155; }
      .card-badge{ background:#334155; border-color:#475569; color:#94a3b8; }
      .stock-unit{ color:#94a3b8; }
      .mat-unit  { color:#e2e8f0; }
      .mat-item.s-sep    { background:#451a0333; border-color:#92400e; }
      .mat-item.s-pronto { background:#052e1633; border-color:#166534; }
      .mat-sep-row       { background:rgba(255,255,255,.07); color:#94a3b8; }
      .mat-sep-row.green { background:rgba(22,163,74,.15); color:#86efac; }
      .empty     { color:#475569; }
      .footer-bar{ color:#475569; }
      .skeleton  { background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%); background-size:200% 100%; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-row">
          <div class="brand-dot"></div>
          <div class="brand-title">SEMCAS · Almoxarifado</div>
        </div>
        <div class="brand-sub">Prefeitura de São Luís · Status ao vivo</div>
      </div>
      <button class="topbar-refresh" id="refreshBtn">
        <span id="refreshIcon">🔄</span>
        <span id="refreshLabel">Atualizar</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="notice" id="noticeEl"></div>

    <!-- 1. BUSCA — primeira coisa que o usuário vê -->
    <div class="card search-card">
      <div class="card-head">
        <div class="card-ic" style="background:#eff6ff">🏛️</div>
        <span class="card-label">Minha Unidade — Status do Pedido</span>
      </div>
      <div class="card-body">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="search" id="searchInput" class="search-input"
            placeholder="Ex: CRAS Centro, CREAS Sol e Mar…"
            autocomplete="off" autocorrect="off" spellcheck="false">
          <button type="button" id="searchClear" class="search-clear" aria-label="Limpar">✕</button>
          <div id="suggestList" class="suggest-list"></div>
        </div>

        <div class="chip-row" id="chipRow">
          <button type="button" class="quick-chip" data-q="CRAS">CRAS</button>
          <button type="button" class="quick-chip" data-q="CREAS">CREAS</button>
          <button type="button" class="quick-chip" data-q="Centro Pop">Centro Pop</button>
          <button type="button" class="quick-chip" data-q="CT ">Conselho Tutelar</button>
          <button type="button" class="quick-chip" data-q="Abrigo">Abrigos</button>
          <button type="button" class="quick-chip" data-q="SEMCAS">Sede</button>
        </div>

        <div id="searchBanner" class="search-banner">
          <div class="search-banner-ic" id="searchBannerIc"></div>
          <div class="search-banner-title" id="searchBannerTitle"></div>
          <div class="search-banner-sub"   id="searchBannerSub"></div>
          <div class="search-banner-unit"  id="searchBannerUnit"></div>
        </div>
      </div>
    </div>

    <!-- 2. ÁGUA E GÁS — linha compacta -->
    <div class="stock-row">
      <div class="stock-mini water" id="waterMini">
        <div class="stock-mini-ic">💧</div>
        <div class="stock-mini-body">
          <div class="stock-mini-num" id="waterNum">—</div>
          <div class="stock-mini-lbl">Galões de água</div>
          <span class="stock-mini-chip ok" id="waterChip" style="display:none"></span>
        </div>
      </div>
      <div class="stock-mini gas" id="gasMini">
        <div class="stock-mini-ic">🔥</div>
        <div class="stock-mini-body">
          <div class="stock-mini-num" id="gasNum">—</div>
          <div class="stock-mini-lbl">Botijões de gás</div>
          <span class="stock-mini-chip ok" id="gasChip" style="display:none"></span>
        </div>
      </div>
    </div>

    <!-- 3. LISTAS — todos os pedidos -->
    <div class="card">
      <div class="card-head">
        <div class="card-ic ic-ok">✅</div>
        <span class="card-label">Pronto para Retirada</span>
        <span class="card-badge" id="prontoBadge">—</span>
      </div>
      <div class="card-body" id="prontoBody"><div class="skeleton sm"></div></div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-ic ic-sep">📦</div>
        <span class="card-label">Em Separação</span>
        <span class="card-badge" id="sepBadge">—</span>
      </div>
      <div class="card-body" id="sepBody"><div class="skeleton sm"></div></div>
    </div>
  </main>

  <div class="footer-bar">
    <div class="live-dot"></div>
    <span id="countdownEl">Carregando...</span>
  </div>

  <!-- runtime-config.js MUST load before the module script, same as dashboard.html -->
  <script type="module" src="./runtime-config.js"></script>

  <script type="module">
    /*
     * STATUS PAGE — SEMCAS ALMOXARIFADO
     * ─────────────────────────────────────────────────────────────────
     * Segue o mesmo padrão de inicialização do dashboard.html:
     *   1. initializeFirebaseServices()
     *   2. initAuthAndListeners() → aguarda autenticação
     *   3. signInAnonUser() como fallback
     *   4. Depois disso, COLLECTIONS está disponível para queries
     *
     * SEM ÍNDICE COMPOSTO — filtros multi-campo são feitos em JavaScript.
     * ─────────────────────────────────────────────────────────────────
     */

    import { initializeFirebaseServices }
      from './js/services/firestore-service.js';
    import { initAuthAndListeners, signInAnonUser, isReady }
      from './js/modules/auth.js';
    import {
      getAguaMovimentacoes, getGasMovimentacoes,
      getEstoqueAgua, getEstoqueGas, getMateriais
    } from './js/utils/cache.js';

    // ── CONFIG ────────────────────────────────────────────────────────
    const GAS_CUTOFF = new Date('2026-04-13T00:00:00').getTime(); // ms

    // ── STATE ─────────────────────────────────────────────────────────
    let countdownTimer = null;
    let nextAt = null, lastUpdated = null;
    let _lastMateriais = [];

    // ── HELPERS ───────────────────────────────────────────────────────
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s ?? '');
      return d.innerHTML;
    }

    // Exclui registros importados do SQL histórico — mesmo critério do dashboard.js
    function isHistoricoImportado(d) {
      if (!d) return false;
      if (d.origem === 'importador_sql') return true;
      if (String(d.observacao ?? '').toLowerCase().includes('importado de sql')) return true;
      if (typeof d.referenciaAno === 'number' || typeof d.referenciaMes === 'number' || typeof d.referenciaSemana === 'number') return true;
      return false;
    }

    function tipoClass(t) {
      const u = String(t ?? '').toUpperCase();
      if (u.includes('CRAS'))                                    return 'tag-cras';
      if (u.includes('CREAS'))                                   return 'tag-creas';
      if (/POP\s*RUA|CENTRO\s*POP/.test(u))                     return 'tag-pop';
      if (/^CT\b/.test(u))                                       return 'tag-ct';
      if (/ABRIGO|ACOLH|RESID|REPUB|LUZ|CASA|ILPI|CAT/.test(u)) return 'tag-abrigo';
      if (/SEDE|SEMCAS|ADMIN|ASTEC|PROCAD/.test(u))             return 'tag-sede';
      return 'tag-outros';
    }

    function renderTipos(tipos) {
      const arr = Array.isArray(tipos) ? tipos : (tipos ? [tipos] : []);
      return arr.filter(Boolean)
        .map(t => `<span class="tipo-tag ${tipoClass(t)}">${esc(t)}</span>`)
        .join('');
    }

    // ── RENDER: ESTOQUE COMPACTO ──────────────────────────────────────
    function renderMiniStock(numId, chipId, count, low) {
      const num = document.getElementById(numId);
      const chip = document.getElementById(chipId);
      if (!num || !chip) return;
      num.textContent = count;
      num.classList.remove('low', 'zero');
      chip.classList.remove('ok', 'low', 'zero');
      if (count <= 0) {
        num.classList.add('zero'); chip.classList.add('zero');
        chip.textContent = 'Sem estoque'; chip.style.display = 'inline-block';
      } else if (count <= low) {
        num.classList.add('low'); chip.classList.add('low');
        chip.textContent = 'Estoque baixo'; chip.style.display = 'inline-block';
      } else {
        chip.classList.add('ok');
        chip.textContent = 'Disponível'; chip.style.display = 'inline-block';
      }
    }

    // ── RENDER: MATERIAIS ─────────────────────────────────────────────
    function renderMateriais(items, filterText) {
      // Normaliza status: "separacao"/"separando" → separando, "retirada"/"pronto" → pronto
      const normalize = s => {
        const st = String(s ?? '').toLowerCase();
        if (st === 'separacao' || st === 'separando') return 'separando';
        if (st === 'retirada'  || st === 'pronto')    return 'pronto';
        return st;
      };

      const query = (filterText || '').trim().toLowerCase();

      const matchesFilter = m => {
        if (!query) return true;
        const nome = String(m.unidadeNome || m.unidade || '').toLowerCase();
        return nome.includes(query);
      };

      const allSep    = items.filter(m => normalize(m.status) === 'separando');
      const allPronto = items.filter(m => normalize(m.status) === 'pronto');

      const sep    = allSep.filter(matchesFilter);
      const pronto = allPronto.filter(matchesFilter);

      // Atualiza badges com totais globais (não filtrados)
      const sb = document.getElementById('sepBadge');
      const pb = document.getElementById('prontoBadge');
      sb.textContent = allSep.length;    sb.className = 'card-badge' + (allSep.length    ? ' has' : '');
      pb.textContent = allPronto.length; pb.className = 'card-badge' + (allPronto.length ? ' has' : '');

      // Banner de resultado da busca
      const banner = document.getElementById('searchBanner');
      const bannerIc = document.getElementById('searchBannerIc');
      const bannerTitle = document.getElementById('searchBannerTitle');
      const bannerSub   = document.getElementById('searchBannerSub');
      const bannerUnit  = document.getElementById('searchBannerUnit');
      if (query && banner) {
        const allMatches = [...pronto, ...sep];
        const unitNames = [...new Set(allMatches.map(m => m.unidadeNome || m.unidade || '').filter(Boolean))];
        const unitText = unitNames.length === 1
          ? unitNames[0]
          : unitNames.length > 1
            ? `${unitNames.length} unidades correspondentes`
            : '';

        banner.className = 'search-banner show ';
        if (pronto.length > 0) {
          banner.className += 'b-pronto';
          bannerIc.textContent   = '✅';
          bannerTitle.textContent = 'PRONTO PARA RETIRADA';
          bannerSub.textContent  = pronto.length === 1
            ? 'Seu pedido já está pronto — pode retirar.'
            : `${pronto.length} pedidos prontos para retirada.`;
          bannerUnit.textContent = unitText ? `📍 ${unitText}` : '';
        } else if (sep.length > 0) {
          banner.className += 'b-sep';
          bannerIc.textContent   = '⏳';
          bannerTitle.textContent = 'EM PREPARAÇÃO';
          bannerSub.textContent  = sep.length === 1
            ? 'Seu pedido está sendo separado agora.'
            : `${sep.length} pedidos sendo separados.`;
          bannerUnit.textContent = unitText ? `📍 ${unitText}` : '';
        } else {
          banner.className += 'b-none';
          bannerIc.textContent   = '📭';
          bannerTitle.textContent = 'Nenhum pedido ativo';
          bannerSub.textContent  = 'Não há pedidos em separação ou aguardando retirada para esta unidade.';
          bannerUnit.textContent = '';
        }
      } else if (banner) {
        banner.className = 'search-banner';
      }

      function makeList(arr, cls, emoji, isSep) {
        if (!arr.length) return `
          <div class="empty">
            <div class="empty-ic">📭</div>
            <div class="empty-txt">${query
              ? 'Nenhum resultado para esta busca'
              : isSep
                ? 'Nenhum material sendo separado agora'
                : 'Nenhum material aguardando retirada'}</div>
          </div>`;

        return '<div class="mat-list">' + arr.map(m => {
          const name  = esc(m.unidadeNome || m.unidade || 'Unidade');
          const tipos = renderTipos(m.tiposMaterial || m.tipos || m.tipoMaterial);
          const sep   = m.responsavelSeparador || m.separador;
          const sepR  = sep
            ? `<div class="mat-sep-row${isSep ? '' : ' green'}">${isSep ? '👤' : '✅ Separado por:'} ${esc(sep)}</div>`
            : '';
          return `
            <div class="mat-item ${cls}">
              <div class="mat-emoji">${emoji}</div>
              <div class="mat-body">
                <div class="mat-unit">${name}</div>
                ${tipos ? `<div class="mat-tipos">${tipos}</div>` : ''}
                ${sepR}
              </div>
            </div>`;
        }).join('') + '</div>';
      }

      document.getElementById('sepBody').innerHTML    = makeList(sep,    's-sep',    '📦', true);
      document.getElementById('prontoBody').innerHTML = makeList(pronto, 's-pronto', '✅', false);
    }

    // ── COMPUTE FROM CACHE (mesma lógica do dashboard.js) ─────────────
    function computeFromCache() {
      // ÁGUA
      const movsAgua = (getAguaMovimentacoes() || []).filter(m => !isHistoricoImportado(m));
      const estoqueAgua = getEstoqueAgua() || [];
      const aguaInicial  = estoqueAgua.filter(e => e.tipo === 'inicial').reduce((s,e) => s + (parseInt(e.quantidade,10) || 0), 0);
      const aguaEntradas = estoqueAgua.filter(e => e.tipo === 'entrada').reduce((s,e) => s + (parseInt(e.quantidade,10) || 0), 0);
      const aguaSaidas   = movsAgua.filter(m => m.tipo === 'entrega').reduce((s,m) => s + (parseInt(m.quantidade,10) || 0), 0);
      const agua = Math.max(0, aguaInicial + aguaEntradas - aguaSaidas);

      // GÁS — corte de 13/04/2026
      const afterCutoff = items => (items || []).filter(it => (it.data?.toMillis?.() ?? 0) >= GAS_CUTOFF);
      const movsGas    = afterCutoff((getGasMovimentacoes() || []).filter(m => !isHistoricoImportado(m)));
      const estoqueGas = afterCutoff(getEstoqueGas() || []);
      const gasInicial  = estoqueGas.filter(e => e.tipo === 'inicial').reduce((s,e) => s + (parseInt(e.quantidade,10) || 0), 0);
      const gasEntradas = estoqueGas.filter(e => e.tipo === 'entrada').reduce((s,e) => s + (parseInt(e.quantidade,10) || 0), 0);
      const gasSaidas   = movsGas.filter(m => m.tipo === 'entrega').reduce((s,m) => s + (parseInt(m.quantidade,10) || 0), 0);
      const gas = Math.max(0, gasInicial + gasEntradas - gasSaidas);

      // MATERIAIS — apenas v2 ativos, status separacao/retirada
      const materiais = (getMateriais() || [])
        .filter(m => !m?.deleted && (m?._version === 2 || m?.origemFluxo === 'v2' || (m?.itemsMap && typeof m.itemsMap === 'object')))
        .filter(m => ['separacao','retirada','separando','pronto'].includes(String(m.status || '').toLowerCase()));

      return { agua, gas, materiais };
    }

    // ── RENDER ────────────────────────────────────────────────────────
    function renderAll() {
      try {
        const data = computeFromCache();
        renderMiniStock('waterNum', 'waterChip', data.agua, 10);
        renderMiniStock('gasNum',   'gasChip',   data.gas,  3);
        _lastMateriais = data.materiais;
        const currentSearch = document.getElementById('searchInput')?.value || '';
        renderMateriais(_lastMateriais, currentSearch);
        lastUpdated = new Date();
        nextAt = new Date(lastUpdated.getTime() + 5 * 60 * 1000);
        startCountdown();
        clearNotice();
      } catch (err) {
        console.error('[Status] render:', err);
        showNotice('⚠️ Erro ao processar dados.', true);
      }
    }

    // ── AUTOCOMPLETE / SUGESTÕES ──────────────────────────────────────
    function renderSuggestions(q) {
      const list = document.getElementById('suggestList');
      if (!list) return;
      const query = q.trim().toLowerCase();
      if (!query || query.length < 1) { list.classList.remove('show'); list.innerHTML = ''; return; }

      const normalize = s => {
        const st = String(s ?? '').toLowerCase();
        if (st === 'separacao' || st === 'separando') return 'separando';
        if (st === 'retirada'  || st === 'pronto')    return 'pronto';
        return st;
      };

      // agrupa por unidade, mantendo o "melhor" status (pronto > separando)
      const map = new Map();
      for (const m of (_lastMateriais || [])) {
        const nome = m.unidadeNome || m.unidade;
        if (!nome) continue;
        if (!nome.toLowerCase().includes(query)) continue;
        const st = normalize(m.status);
        const prev = map.get(nome);
        if (!prev || (st === 'pronto' && prev !== 'pronto')) map.set(nome, st);
      }

      const items = [...map.entries()].slice(0, 8);
      if (!items.length) { list.classList.remove('show'); list.innerHTML = ''; return; }

      list.innerHTML = items.map(([nome, st]) => {
        const stCls = st === 'pronto' ? 'pronto' : 'sep';
        const stTxt = st === 'pronto' ? '✅ Pronto' : '⏳ Separando';
        return `
          <div class="suggest-item" data-name="${esc(nome)}">
            <span class="suggest-name">${esc(nome)}</span>
            <span class="suggest-status ${stCls}">${stTxt}</span>
          </div>`;
      }).join('');
      list.classList.add('show');
    }

    function selectSuggestion(name) {
      const input = document.getElementById('searchInput');
      input.value = name;
      document.getElementById('suggestList').classList.remove('show');
      document.getElementById('searchClear').classList.add('show');
      setActiveChip('');
      saveLastSearch(name);
      renderMateriais(_lastMateriais, name);
    }

    // ── PERSISTÊNCIA: LEMBRA ÚLTIMA UNIDADE ───────────────────────────
    const LS_KEY = 'semcas_status_last_unit';
    function saveLastSearch(v) {
      try { localStorage.setItem(LS_KEY, v || ''); } catch (_) {}
    }
    function loadLastSearch() {
      try { return localStorage.getItem(LS_KEY) || ''; } catch (_) { return ''; }
    }

    // ── CHIPS DE TIPO ─────────────────────────────────────────────────
    function setActiveChip(query) {
      document.querySelectorAll('.quick-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.q === query);
      });
    }

    function doRefresh() {
      // Como usamos onSnapshot, os dados já estão sempre atualizados.
      // Apenas re-renderiza com os dados mais recentes do cache.
      setUI(true);
      try { renderAll(); } finally { setTimeout(() => setUI(false), 350); }
    }

    // ── UI UTILS ──────────────────────────────────────────────────────
    function setUI(busy) {
      const btn = document.getElementById('refreshBtn');
      document.getElementById('refreshIcon').className    = busy ? 'spin' : '';
      document.getElementById('refreshLabel').textContent = busy ? 'Atualizando…' : 'Atualizar';
      btn.disabled = busy;
    }
    function showNotice(msg, err) {
      const el = document.getElementById('noticeEl');
      el.textContent = msg;
      el.className = 'notice show' + (err ? ' err' : '');
    }
    function clearNotice() { document.getElementById('noticeEl').className = 'notice'; }

    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      const el = document.getElementById('countdownEl');
      const tick = () => {
        if (!nextAt || !lastUpdated) return;
        const hhmm = lastUpdated.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const rem  = nextAt - Date.now();
        if (rem <= 0) { el.textContent = `Atualizado às ${hhmm} · atualizando…`; return; }
        const m = Math.floor(rem / 60000);
        const s = Math.floor((rem % 60000) / 1000).toString().padStart(2, '0');
        el.textContent = `Atualizado às ${hhmm} · próxima em ${m}m${s}s`;
      };
      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    // ── SEARCH ────────────────────────────────────────────────────────
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const suggestList = document.getElementById('suggestList');

    function applySearch(value, opts = {}) {
      searchInput.value = value;
      searchClear.classList.toggle('show', !!value);
      renderMateriais(_lastMateriais, value);
      if (opts.suggest) renderSuggestions(value);
      else suggestList.classList.remove('show');
      saveLastSearch(value);
    }

    searchInput.addEventListener('input', e => {
      const v = e.target.value;
      searchClear.classList.toggle('show', !!v);
      renderMateriais(_lastMateriais, v);
      renderSuggestions(v);
      setActiveChip('');
      saveLastSearch(v);
    });

    searchInput.addEventListener('focus', () => {
      if (searchInput.value) renderSuggestions(searchInput.value);
    });

    searchInput.addEventListener('blur', () => {
      // delay para permitir click na sugestão antes de fechar
      setTimeout(() => suggestList.classList.remove('show'), 180);
    });

    searchClear.addEventListener('click', () => {
      applySearch('');
      setActiveChip('');
      searchInput.focus();
    });

    suggestList.addEventListener('click', e => {
      const item = e.target.closest('.suggest-item');
      if (!item) return;
      selectSuggestion(item.dataset.name);
    });

    document.querySelectorAll('.quick-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const q = chip.dataset.q;
        const isActive = chip.classList.contains('active');
        if (isActive) {
          applySearch('');
          setActiveChip('');
        } else {
          applySearch(q);
          setActiveChip(q);
        }
      });
    });

    // ── INIT — mesmo padrão do dashboard.html ─────────────────────────
    document.getElementById('refreshBtn').addEventListener('click', doRefresh);

    async function init() {
      try {
        // Marca body como tv-mode para que o auth chame nosso renderDash automaticamente
        document.body.classList.add('tv-mode');

        initializeFirebaseServices();

        // O auth chama renderDash sempre que listener recebe novos dados
        await initAuthAndListeners(renderAll, null, null);

        // Fallback: autentica anonimamente se ainda não estiver pronto
        setTimeout(() => {
          if (!isReady()) signInAnonUser().catch(e => console.error('[Status] signIn:', e));
        }, 1200);

        // Restaura última unidade buscada (se houver)
        const lastUnit = loadLastSearch();
        if (lastUnit) {
          searchInput.value = lastUnit;
          searchClear.classList.add('show');
        }

        // Render inicial (mesmo sem dados ainda — vai mostrar 0/skeletons até listeners chegarem)
        setTimeout(renderAll, 2000);
      } catch (err) {
        console.error('[Status] init:', err);
        showNotice('⚠️ Erro ao conectar. Tentando novamente…', true);
        setTimeout(init, 10_000);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
