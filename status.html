<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0c1a3a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Status do Almoxarifado SEMCAS — Água, Gás e Materiais">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <title>Status · SEMCAS Almoxarifado</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0c1a3a;
      --navy-2:    #142454;
      --sky:       #0ea5e9;
      --sky-bg:    #f0f9ff;
      --sky-bd:    #bae6fd;
      --orange:    #ea8300;
      --orange-bg: #fff7ed;
      --green:     #16a34a;
      --green-bg:  #f0fdf4;
      --green-bd:  #86efac;
      --yellow:    #d97706;
      --yellow-bg: #fffbeb;
      --yellow-bd: #fde68a;
      --red:       #dc2626;
      --red-bg:    #fef2f2;
      --red-bd:    #fecaca;
      --gray-100:  #f1f5f9;
      --gray-200:  #e2e8f0;
      --gray-400:  #94a3b8;
      --gray-500:  #64748b;
      --gray-900:  #0f172a;
      --font-num:  'JetBrains Mono', ui-monospace, monospace;
    }

    html { height: 100%; scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh; min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 60%, #1a306b 100%);
      padding: env(safe-area-inset-top, 0px) 0 0;
    }
    .topbar-inner { padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
    .brand { flex: 1; min-width: 0; }
    .brand-row { display: flex; align-items: center; gap: 8px; }
    .brand-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,.7);
      flex-shrink: 0; animation: livepulse 2.5s ease-in-out infinite;
    }
    @keyframes livepulse {
      0%,100% { opacity:1; box-shadow:0 0 8px rgba(34,197,94,.7); }
      50%      { opacity:.5; box-shadow:0 0 4px rgba(34,197,94,.3); }
    }
    .brand-title { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .brand-sub   { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; font-weight: 500; }

    /* ── MAIN ── */
    .main { padding: 14px 14px 20px; max-width: 540px; margin: 0 auto; }

    .notice {
      background:#fef3c7; border:1px solid #fde68a; border-radius:12px;
      padding:12px 14px; margin-bottom:14px; display:none;
      font-size:13px; color:#92400e; font-weight:500;
    }
    .notice.show { display:block; }
    .notice.err  { background:var(--red-bg); border-color:var(--red-bd); color:#991b1b; }

    /* ── CARDS ── */
    .card {
      background: #fff; border-radius: 18px; border: 1px solid var(--gray-200);
      overflow: hidden; margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
    }
    .card-head {
      padding: 13px 16px 12px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--gray-100);
    }
    .card-ic {
      width: 38px; height: 38px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .card-label {
      flex: 1; font-size: 11px; font-weight: 800;
      color: var(--gray-500); text-transform: uppercase; letter-spacing: .07em;
    }
    .card-body { padding: 16px; }

    /* ── ESTOQUE MINI ── */
    .stock-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stock-mini {
      background: #fff; border: 1px solid var(--gray-200); border-radius: 14px;
      padding: 14px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .stock-mini-ic {
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .stock-mini.water .stock-mini-ic { background: var(--sky-bg); }
    .stock-mini.gas   .stock-mini-ic { background: var(--orange-bg); }
    .stock-mini-body  { flex: 1; min-width: 0; }
    .stock-mini-num   {
      font-family: var(--font-num); font-size: 30px; font-weight: 700;
      line-height: 1; letter-spacing: -1px;
    }
    .stock-mini.water .stock-mini-num { color: var(--sky); }
    .stock-mini.gas   .stock-mini-num { color: var(--orange); }
    .stock-mini-num.low  { color: var(--yellow) !important; }
    .stock-mini-num.zero { color: var(--red)    !important; }
    .stock-mini-lbl {
      font-size: 10px; font-weight: 700; color: var(--gray-500);
      text-transform: uppercase; letter-spacing: .05em; margin-top: 3px;
    }
    .stock-mini-chip {
      display: inline-block; font-size: 9.5px; font-weight: 800;
      padding: 2px 7px; border-radius: 999px; margin-top: 4px; letter-spacing: .04em;
    }
    .stock-mini-chip.ok   { background: var(--green-bg);  color: var(--green); }
    .stock-mini-chip.low  { background: var(--yellow-bg); color: var(--yellow); }
    .stock-mini-chip.zero { background: var(--red-bg);    color: var(--red); }

    /* ── STEP HINT ── */
    .step-hint {
      font-size: 14px; font-weight: 600; color: var(--gray-500);
      margin-bottom: 14px; text-align: center;
    }

    /* ── TYPE GRID (passo 1) ── */
    .type-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .type-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 18px 10px; border-radius: 14px;
      border: 1.5px solid var(--gray-200); background: var(--gray-100);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: all .12s; font-family: 'Outfit', sans-serif;
    }
    .type-btn:active { transform: scale(.97); }
    .type-btn:hover  { border-color: var(--navy); background: #fff; }
    .type-btn-ic  { font-size: 28px; line-height: 1; }
    .type-btn-lbl { font-size: 13px; font-weight: 800; color: var(--gray-900); text-align: center; }
    .type-btn-sub { font-size: 10px; font-weight: 500; color: var(--gray-400); margin-top: -4px; }

    /* ── BACK BUTTON ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--gray-500); background: none; border: none;
      cursor: pointer; padding: 0 0 14px 0; -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { opacity: .6; }

    /* ── UNIT LIST (passo 2) ── */
    .unit-list { display: flex; flex-direction: column; gap: 6px; }
    .unit-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 14px; border-radius: 12px;
      border: 1.5px solid var(--gray-200); background: #fff;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      font-size: 14px; font-weight: 600; color: var(--gray-900);
      transition: all .12s;
    }
    .unit-item:active { transform: scale(.98); background: var(--gray-100); }
    .unit-item-arrow { color: var(--gray-400); font-size: 16px; }

    /* ── RESULT BANNER (passo 3) ── */
    .result-banner {
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px; border-radius: 16px; border: 2px solid;
      text-align: center; gap: 6px;
    }
    .result-banner.pronto { background: var(--green-bg);  border-color: var(--green); }
    .result-banner.sep    { background: var(--yellow-bg); border-color: var(--yellow); }
    .result-banner.nenhum { background: var(--gray-100);  border-color: var(--gray-200); }
    .result-banner-ic    { font-size: 44px; line-height: 1; margin-bottom: 4px; }
    .result-banner-title { font-size: 20px; font-weight: 900; letter-spacing: -.3px; }
    .result-banner.pronto .result-banner-title { color: #065f46; }
    .result-banner.sep    .result-banner-title { color: #92400e; }
    .result-banner.nenhum .result-banner-title { color: var(--gray-500); }
    .result-banner-sub   { font-size: 14px; font-weight: 600; opacity: .85; }
    .result-banner-unit  { font-size: 12px; font-weight: 700; opacity: .6; margin-top: 4px; }

    /* ── LOADING ── */
    .skeleton {
      background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
      background-size: 200% 100%; animation: shimmer 1.6s infinite;
      border-radius: 10px; height: 48px; margin-bottom: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── FOOTER ── */
    .footer-bar {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:4px 18px 24px; font-size:11px; color:var(--gray-400); font-weight:500;
      max-width:540px; margin:0 auto; text-align:center;
    }
    .live-dot {
      width:6px; height:6px; border-radius:50%; flex-shrink:0;
      background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,.5);
    }
    #countdownEl { font-family:var(--font-num); font-size: 10px; }

    @media (max-width:380px) {
      .topbar-inner { padding:12px 14px; }
      .brand-title  { font-size:15px; }
      .main         { padding:10px 10px 20px; }
      .type-btn-ic  { font-size:22px; }
      .type-btn     { padding: 14px 8px; }
    }
    @media (min-width:600px) {
      .main         { padding:20px 20px 28px; }
      .type-grid    { grid-template-columns: repeat(3, 1fr); }
    }

    @media (prefers-color-scheme:dark) {
      body           { background:#0f172a; color:#e2e8f0; }
      .card          { background:#1e293b; border-color:#334155; }
      .card-head     { border-bottom-color:#334155; }
      .stock-mini    { background:#1e293b; border-color:#334155; }
      .type-btn      { background:#1e293b; border-color:#334155; }
      .type-btn:hover{ background:#273549; border-color:#60a5fa; }
      .type-btn-lbl  { color:#e2e8f0; }
      .unit-item     { background:#1e293b; border-color:#334155; color:#e2e8f0; }
      .unit-item:active { background:#273549; }
      .result-banner.pronto { background:#052e1633; border-color:#166534; }
      .result-banner.sep    { background:#451a0333; border-color:#92400e; }
      .result-banner.nenhum { background:#1e293b;   border-color:#334155; }
      .result-banner.pronto .result-banner-title { color:#86efac; }
      .result-banner.sep    .result-banner-title { color:#fcd34d; }
      .result-banner.nenhum .result-banner-title { color:#94a3b8; }
      .skeleton      { background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%); background-size:200% 100%; }
      .footer-bar    { color:#475569; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-row">
          <div class="brand-dot"></div>
          <div class="brand-title">SEMCAS · Almoxarifado</div>
        </div>
        <div class="brand-sub">Prefeitura de São Luís · Consulta de estoque e pedidos</div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="notice" id="noticeEl"></div>

    <!-- ESTOQUE — água e gás sempre visíveis -->
    <div class="stock-row">
      <div class="stock-mini water">
        <div class="stock-mini-ic">💧</div>
        <div class="stock-mini-body">
          <div class="stock-mini-num" id="waterNum">—</div>
          <div class="stock-mini-lbl">Galões de água</div>
          <span class="stock-mini-chip" id="waterChip" style="display:none"></span>
        </div>
      </div>
      <div class="stock-mini gas">
        <div class="stock-mini-ic">🔥</div>
        <div class="stock-mini-body">
          <div class="stock-mini-num" id="gasNum">—</div>
          <div class="stock-mini-lbl">Botijões de gás</div>
          <span class="stock-mini-chip" id="gasChip" style="display:none"></span>
        </div>
      </div>
    </div>

    <!-- PEDIDOS — seleção por tipo → unidade → resultado -->
    <div class="card">
      <div class="card-head">
        <div class="card-ic" style="background:#eff6ff">📦</div>
        <span class="card-label">Verificar pedido da minha unidade</span>
      </div>
      <div class="card-body">

        <!-- Passo 1: Tipo de unidade -->
        <div id="step1">
          <p class="step-hint">Qual o tipo da sua unidade?</p>
          <div class="type-grid">
            <button class="type-btn" data-type="cras">
              <span class="type-btn-ic">🏘️</span>
              <span class="type-btn-lbl">CRAS</span>
            </button>
            <button class="type-btn" data-type="creas">
              <span class="type-btn-ic">👥</span>
              <span class="type-btn-lbl">CREAS</span>
            </button>
            <button class="type-btn" data-type="pop">
              <span class="type-btn-ic">🏠</span>
              <span class="type-btn-lbl">Centro Pop</span>
            </button>
            <button class="type-btn" data-type="ct">
              <span class="type-btn-ic">⚖️</span>
              <span class="type-btn-lbl">Cons. Tutelar</span>
            </button>
            <button class="type-btn" data-type="abrigo">
              <span class="type-btn-ic">🏡</span>
              <span class="type-btn-lbl">Abrigos</span>
            </button>
            <button class="type-btn" data-type="sede">
              <span class="type-btn-ic">🏛️</span>
              <span class="type-btn-lbl">Sede / SEMCAS</span>
            </button>
          </div>
        </div>

        <!-- Passo 2: Unidade específica -->
        <div id="step2" style="display:none">
          <button class="back-btn" id="backStep2">← Voltar</button>
          <p class="step-hint" id="step2Hint">Selecione sua unidade:</p>
          <div class="unit-list" id="unitList">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
        </div>

        <!-- Passo 3: Resultado -->
        <div id="step3" style="display:none">
          <button class="back-btn" id="backStep3">← Escolher outra unidade</button>
          <div id="resultBanner" class="result-banner nenhum">
            <div class="result-banner-ic">⏳</div>
            <div class="result-banner-title">Verificando…</div>
            <div class="result-banner-sub"></div>
            <div class="result-banner-unit"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div class="footer-bar">
    <div class="live-dot"></div>
    <span id="countdownEl">Carregando…</span>
  </div>

  <script type="module" src="./runtime-config.js"></script>

  <script type="module">
    /*
     * STATUS PAGE — SEMCAS ALMOXARIFADO
     * ─────────────────────────────────────────────────────────────────
     * ECONOMIA MÁXIMA DE LEITURAS FIREBASE:
     *
     *  • Água/Gás: ~15 docs, cache 1h  → maioria das visitas = 0 leituras
     *  • Unidades: ~50 docs, cache 24h → 1x por dia por dispositivo
     *  • Materiais por unidade: ~3 docs → só ao selecionar uma unidade
     *  • Sem auto-refresh, sem botão de forçar — só lê quando necessário
     * ─────────────────────────────────────────────────────────────────
     */

    import {
      initializeFirebaseServices, ensureCollectionsWithData,
      getPrimaryCollections, getLegacyCollections, auth
    } from './js/services/firestore-service.js';
    import { signInAnonymously, onAuthStateChanged,
             setPersistence, indexedDBLocalPersistence, browserLocalPersistence
           } from 'firebase/auth';
    import { getDocs, query, where } from 'firebase/firestore';

    // ── CONFIG ────────────────────────────────────────────────────────
    const GAS_CUTOFF  = new Date('2026-04-13T00:00:00').getTime();
    const TTL_STOCK   = 60 * 60 * 1000;       // estoque água/gás: 1 hora
    const TTL_UNITS   = 24 * 60 * 60 * 1000;  // lista de unidades: 24 horas
    const TTL_MAT     = 30 * 60 * 1000;       // materiais por unidade: 30 min

    // ── STATE ─────────────────────────────────────────────────────────
    let _collections  = null;
    let _authReady    = false;
    let _authPromise  = null;
    let countdownTimer = null;
    let lastUpdated   = null;

    // ── CACHE HELPERS ─────────────────────────────────────────────────
    function cacheGet(key, ttl) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (!obj || (Date.now() - obj.ts) > ttl) return null;
        return obj;
      } catch (_) { return null; }
    }
    function cacheSet(key, data) {
      try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch (_) {}
    }

    // ── HELPERS ───────────────────────────────────────────────────────
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s ?? '');
      return d.innerHTML;
    }

    function isHistoricoImportado(d) {
      if (!d) return false;
      if (d.origem === 'importador_sql') return true;
      if (String(d.observacao ?? '').toLowerCase().includes('importado de sql')) return true;
      if (typeof d.referenciaAno === 'number' || typeof d.referenciaMes === 'number'
          || typeof d.referenciaSemana === 'number') return true;
      return false;
    }

    // Classifica unidade usando o campo `tipo` do Firestore (fonte de verdade).
    // Fallback por nome apenas para unidades sem tipo definido (legado).
    function classifyUnit(nome, tipo) {
      // ── Mapeamento direto pelo campo tipo (Firestore) ──────────────────
      const t = (tipo || '').toUpperCase().trim();
      if (t === 'CRAS')                   return 'cras';
      if (t === 'CREAS')                  return 'creas';
      if (t === 'CT' || t === 'CONSELHO') return 'ct';   // CT = Cons. Tutelar; CONSELHO = Cmas/Cmdi
      if (t === 'CENTRO POP')             return 'pop';
      if (t === 'ABRIGO')                 return 'abrigo';
      if (t === 'SEDE')                   return 'sede';
      // ── Fallback por nome (unidades sem tipo ou tipo não mapeado) ──────
      const u = (nome || '').toUpperCase();
      if (/\bCREAS\b/.test(u))            return 'creas';
      if (/\bCRAS\b/.test(u))             return 'cras';
      if (/CENTRO\s*POP/.test(u))         return 'pop';
      if (/\bCT\b/.test(u))               return 'ct';
      if (/\bILPI\b|CAT\b/.test(u))       return 'abrigo';
      if (/SEMCAS|SEDE|PROCAD|ASTEC/.test(u)) return 'sede';
      return 'outros';
    }

    // ── AGUARDA AUTH ──────────────────────────────────────────────────
    function waitForAuth() {
      if (_authPromise) return _authPromise;
      _authPromise = new Promise(resolve => {
        if (_authReady) { resolve(); return; }
        const unsub = onAuthStateChanged(auth, user => {
          if (user) { _authReady = true; unsub(); resolve(); }
        });
        setTimeout(resolve, 8000); // fallback
      });
      return _authPromise;
    }

    // ── COLEÇÕES ──────────────────────────────────────────────────────
    async function getCollections() {
      if (_collections) return _collections;
      await waitForAuth();
      const which = await ensureCollectionsWithData();
      _collections = (which === 'legacy') ? getLegacyCollections() : getPrimaryCollections();
      return _collections;
    }

    // ── FETCH: ESTOQUE ÁGUA E GÁS ─────────────────────────────────────
    // Otimização: se __resumo__ existir em estoqueAgua, não lemos controleAgua
    // (economia de ~400-600 leituras em cada visita fria).
    async function fetchStock() {
      const cached = cacheGet('semcas_stock_v2', TTL_STOCK);
      if (cached?.data) { renderStock(cached.data); lastUpdated = new Date(cached.ts); startCountdown(); return; }

      await waitForAuth();
      const C = await getCollections();

      // Lê estoqueAgua e estoqueGas sempre (pequenos, ~20 docs cada)
      const [estAguaSnap, estGasSnap] = await Promise.all([
        getDocs(C.estoqueAgua),
        getDocs(C.estoqueGas)
      ]);

      const estAgua = estAguaSnap.docs.map(d => d.data());
      const estGas  = estGasSnap.docs.map(d => d.data());

      // ── ÁGUA: usa __resumo__ se disponível, senão fallback para leitura de movimentos ──
      const resumoAgua = estAgua.find(e => e.tipo === '__resumo__');
      let aguaSaidas;
      if (resumoAgua) {
        // __resumo__ existe → 0 leituras extras de controleAgua 🎉
        aguaSaidas = resumoAgua.totalSaidas || 0;
      } else {
        // Fallback: __resumo__ ainda não foi criado (antes da migração rodar no app principal)
        const movAguaSnap = await getDocs(query(C.aguaMov, where('tipo', '==', 'entrega')));
        aguaSaidas = movAguaSnap.docs
          .map(d => d.data())
          .filter(m => !isHistoricoImportado(m))
          .reduce((s, m) => s + (parseInt(m.quantidade, 10) || 0), 0);
      }
      const aguaInicial  = estAgua.filter(e => e.tipo==='inicial').reduce((s,e)=>s+(parseInt(e.quantidade,10)||0),0);
      const aguaEntradas = estAgua.filter(e => e.tipo==='entrada').reduce((s,e)=>s+(parseInt(e.quantidade,10)||0),0);
      const agua = Math.max(0, aguaInicial + aguaEntradas - aguaSaidas);

      // ── GÁS: coleção pequena (~300 docs limit no listener), lê movimentos direto ──
      const movGasSnap = await getDocs(query(C.gasMov, where('tipo', '==', 'entrega')));
      const movGas = movGasSnap.docs.map(d => d.data()).filter(m => !isHistoricoImportado(m));
      const tsOf    = it => it.data?.toMillis?.() ?? (it.data?.seconds ? it.data.seconds*1000 : 0);
      const estGasC = estGas.filter(e => tsOf(e) >= GAS_CUTOFF);
      const movGasC = movGas.filter(m => tsOf(m) >= GAS_CUTOFF);
      const gasInicial  = estGasC.filter(e => e.tipo==='inicial').reduce((s,e)=>s+(parseInt(e.quantidade,10)||0),0);
      const gasEntradas = estGasC.filter(e => e.tipo==='entrada').reduce((s,e)=>s+(parseInt(e.quantidade,10)||0),0);
      const gasSaidas   = movGasC.reduce((s,m)=>s+(parseInt(m.quantidade,10)||0),0);
      const gas = Math.max(0, gasInicial + gasEntradas - gasSaidas);

      const data = { agua, gas };
      cacheSet('semcas_stock_v2', data);
      renderStock(data);
      lastUpdated = new Date();
      startCountdown();
    }

    // ── FETCH: LISTA DE UNIDADES ──────────────────────────────────────
    // v4: inclui tipo + flags de serviço; filtra não-materiais e duplicatas
    async function fetchUnits() {
      const cached = cacheGet('semcas_units_v4', TTL_UNITS);
      if (cached?.data) return cached.data;

      const C = await getCollections();
      const snap = await getDocs(C.unidades);

      const seen = new Set();
      const units = snap.docs
        .map(d => {
          const data = d.data();
          return {
            nome:             data.nome || d.id,
            id:               d.id,
            tipo:             data.tipo || '',
            atendeMateriais:  data.atendeMateriais ?? true,
          };
        })
        .filter(u => {
          if (!u.nome) return false;
          // Exclui unidades que não recebem materiais
          if (!u.atendeMateriais) return false;
          // Deduplica por nome (case-insensitive, sem espaços extras)
          const key = u.nome.toLowerCase().trim();
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

      cacheSet('semcas_units_v4', units);
      return units;
    }

    // ── FETCH: MATERIAIS DE UMA UNIDADE ───────────────────────────────
    async function fetchMaterialsForUnit(unitNome) {
      const key = 'semcas_mat_v2_' + unitNome;
      const cached = cacheGet(key, TTL_MAT);
      if (cached) return cached.data;

      const C = await getCollections();
      const snap = await getDocs(
        query(C.materiais, where('unidadeNome', '==', unitNome))
      );

      const materiais = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(m => !m.deleted
          && (m._version === 2 || m.origemFluxo === 'v2' || (m.itemsMap && typeof m.itemsMap === 'object'))
          && ['separacao','retirada','separando','pronto'].includes(String(m.status||'').toLowerCase())
        );

      cacheSet(key, materiais);
      return materiais;
    }

    // ── RENDER: ESTOQUE ───────────────────────────────────────────────
    function renderStock({ agua, gas }) {
      renderMiniStock('waterNum', 'waterChip', agua, 10);
      renderMiniStock('gasNum',   'gasChip',   gas,  3);
    }

    function renderMiniStock(numId, chipId, count, low) {
      const num  = document.getElementById(numId);
      const chip = document.getElementById(chipId);
      if (!num || !chip) return;
      num.textContent = count;
      num.classList.remove('low', 'zero');
      chip.classList.remove('ok', 'low', 'zero');
      if (count <= 0) {
        num.classList.add('zero'); chip.className = 'stock-mini-chip zero';
        chip.textContent = 'Sem estoque'; chip.style.display = 'inline-block';
      } else if (count <= low) {
        num.classList.add('low'); chip.className = 'stock-mini-chip low';
        chip.textContent = 'Estoque baixo'; chip.style.display = 'inline-block';
      } else {
        chip.className = 'stock-mini-chip ok';
        chip.textContent = 'Disponível'; chip.style.display = 'inline-block';
      }
    }

    // ── NAVEGAÇÃO ENTRE PASSOS ────────────────────────────────────────
    function showStep(n) {
      [1,2,3].forEach(i => {
        document.getElementById('step'+i).style.display = (i===n) ? '' : 'none';
      });
    }

    // ── PASSO 1 → 2: Selecionou tipo ─────────────────────────────────
    async function onTypeSelected(type) {
      const labels = {
        cras: 'CRAS', creas: 'CREAS', pop: 'Centro Pop',
        ct: 'Conselho Tutelar', abrigo: 'Abrigos', sede: 'Sede / SEMCAS'
      };
      document.getElementById('step2Hint').textContent = `Selecione sua unidade — ${labels[type] || type}:`;
      document.getElementById('unitList').innerHTML =
        '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
      showStep(2);

      let units;
      try {
        units = await fetchUnits();
      } catch (e) {
        document.getElementById('unitList').innerHTML =
          '<p style="color:var(--red);font-size:13px;font-weight:600;text-align:center">Não foi possível carregar as unidades. Tente novamente.</p>';
        return;
      }

      const filtered = units.filter(u => classifyUnit(u.nome, u.tipo) === type);

      if (!filtered.length) {
        document.getElementById('unitList').innerHTML =
          '<p style="color:var(--gray-400);font-size:13px;font-weight:600;text-align:center;padding:12px 0">Nenhuma unidade encontrada para este tipo.</p>';
        return;
      }

      document.getElementById('unitList').innerHTML = filtered.map(u => `
        <button class="unit-item" data-nome="${esc(u.nome)}">
          <span>${esc(u.nome)}</span>
          <span class="unit-item-arrow">›</span>
        </button>
      `).join('');

      document.getElementById('unitList').querySelectorAll('.unit-item').forEach(btn => {
        btn.addEventListener('click', () => onUnitSelected(btn.dataset.nome));
      });
    }

    // ── PASSO 2 → 3: Selecionou unidade ──────────────────────────────
    async function onUnitSelected(unitNome) {
      showStep(3);
      const banner = document.getElementById('resultBanner');
      banner.className = 'result-banner nenhum';
      banner.innerHTML = `
        <div class="result-banner-ic">⏳</div>
        <div class="result-banner-title">Verificando…</div>
        <div class="result-banner-sub"></div>
        <div class="result-banner-unit"></div>
      `;

      let materiais;
      try {
        materiais = await fetchMaterialsForUnit(unitNome);
      } catch (e) {
        banner.innerHTML = `
          <div class="result-banner-ic">⚠️</div>
          <div class="result-banner-title">Erro ao verificar</div>
          <div class="result-banner-sub">Tente novamente em instantes.</div>
          <div class="result-banner-unit"></div>
        `;
        return;
      }

      const normalize = s => {
        const st = String(s ?? '').toLowerCase();
        if (st === 'retirada' || st === 'pronto')      return 'pronto';
        if (st === 'separacao' || st === 'separando')  return 'separando';
        return st;
      };

      const prontos   = materiais.filter(m => normalize(m.status) === 'pronto');
      const separando = materiais.filter(m => normalize(m.status) === 'separando');

      if (prontos.length > 0) {
        const sep = prontos[0].responsavelSeparador || prontos[0].separador;
        banner.className = 'result-banner pronto';
        banner.innerHTML = `
          <div class="result-banner-ic">✅</div>
          <div class="result-banner-title">PRONTO PARA RETIRADA</div>
          <div class="result-banner-sub">${prontos.length === 1 ? 'Seu pedido está pronto — pode retirar no almoxarifado.' : prontos.length + ' pedidos prontos para retirada.'}</div>
          ${sep ? `<div class="result-banner-unit">✔ Separado por ${esc(sep)}</div>` : ''}
          <div class="result-banner-unit" style="margin-top:8px">📍 ${esc(unitNome)}</div>
        `;
      } else if (separando.length > 0) {
        banner.className = 'result-banner sep';
        banner.innerHTML = `
          <div class="result-banner-ic">⏳</div>
          <div class="result-banner-title">EM PREPARAÇÃO</div>
          <div class="result-banner-sub">${separando.length === 1 ? 'Seu pedido está sendo separado agora.' : separando.length + ' pedidos em separação.'}</div>
          <div class="result-banner-unit">📍 ${esc(unitNome)}</div>
        `;
      } else {
        banner.className = 'result-banner nenhum';
        banner.innerHTML = `
          <div class="result-banner-ic">📭</div>
          <div class="result-banner-title">Nenhum pedido ativo</div>
          <div class="result-banner-sub">Não há pedidos em separação ou aguardando retirada para esta unidade no momento.</div>
          <div class="result-banner-unit">📍 ${esc(unitNome)}</div>
        `;
      }
    }

    // ── COUNTDOWN ─────────────────────────────────────────────────────
    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      const el = document.getElementById('countdownEl');
      const tick = () => {
        if (!lastUpdated) { el.textContent = 'Carregando…'; return; }
        const hhmm    = lastUpdated.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const diffMin = Math.floor((Date.now() - lastUpdated.getTime()) / 60000);
        const diffH   = Math.floor(diffMin / 60);
        if (diffMin < 1)       el.textContent = `Estoque atualizado agora · ${hhmm}`;
        else if (diffMin < 60) el.textContent = `Estoque atualizado há ${diffMin} min · ${hhmm}`;
        else                   el.textContent = `Estoque de ${hhmm} — reabra para atualizar`;
      };
      tick();
      countdownTimer = setInterval(tick, 60_000);
    }

    // ── NOTICE ────────────────────────────────────────────────────────
    function showNotice(msg, isErr) {
      const el = document.getElementById('noticeEl');
      el.textContent = msg;
      el.className = 'notice show' + (isErr ? ' err' : '');
    }
    function clearNotice() {
      document.getElementById('noticeEl').className = 'notice';
    }

    // ── INIT ──────────────────────────────────────────────────────────
    async function init() {
      try {
        initializeFirebaseServices();

        // Auth anônimo persistente (invisível para o usuário)
        try { await setPersistence(auth, indexedDBLocalPersistence); }
        catch (_) { try { await setPersistence(auth, browserLocalPersistence); } catch (_) {} }

        onAuthStateChanged(auth, async user => {
          if (user) {
            _authReady = true;
          } else {
            try { await signInAnonymously(auth); }
            catch (e) { console.error('[Status] signIn:', e); }
          }
        });

        // Carrega estoque (usa cache imediatamente se disponível)
        fetchStock().catch(err => {
          console.error('[Status] fetchStock:', err);
          showNotice('Não foi possível carregar o estoque. Verifique sua internet.', true);
        });

        // Navegação — tipo selecionado
        document.querySelectorAll('.type-btn').forEach(btn => {
          btn.addEventListener('click', () => onTypeSelected(btn.dataset.type));
        });

        // Voltar passo 2 → 1
        document.getElementById('backStep2').addEventListener('click', () => showStep(1));

        // Voltar passo 3 → 2
        document.getElementById('backStep3').addEventListener('click', () => showStep(2));

      } catch (err) {
        console.error('[Status] init:', err);
        showNotice('Não foi possível conectar. Tente recarregar a página.', true);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
